<!DOCTYPE html>
<html>
<head>
<title>SVM Loan Prediction</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f6f9;
    padding: 40px;
}
.container {
    background: white;
    padding: 30px;
    width: 500px;
    margin: auto;
    border-radius: 8px;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
}
h2 {
    text-align: center;
}
label {
    font-weight: bold;
}
input, select {
    width: 100%;
    padding: 8px;
    margin: 5px 0 15px 0;
}
button {
    width: 100%;
    padding: 10px;
    background-color: #4CAF50;
    color: white;
    border: none;
    cursor: pointer;
}
button:hover {
    background-color: #45a049;
}
.result {
    margin-top: 20px;
    padding: 15px;
    background-color: #e7f3ff;
    border-left: 5px solid #2196F3;
}
</style>
</head>

<body>
<div class="container">
<h2>Loan Approval Prediction (SVM)</h2>

<form action="/predict" method="POST">

<label>Gender</label>
<select name="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<label>Married</label>
<select name="married">
<option value="yes">Yes</option>
<option value="no">No</option>
</select>

<label>Dependents</label>
<input type="text" name="dependents" required>

<label>Education</label>
<select name="education">
<option value="graduate">Graduate</option>
<option value="not graduate">Not Graduate</option>
</select>

<label>Self Employed</label>
<select name="self_employed">
<option value="yes">Yes</option>
<option value="no">No</option>
</select>

<label>Applicant Income</label>
<input type="number" name="applicantincome" required>

<label>Co-Applicant Income</label>
<input type="number" name="coapplicantincome" required>

<label>Loan Amount</label>
<input type="number" name="loanamount" required>

<label>Loan Amount Term</label>
<input type="number" name="loan_amount_term" required>

<label>Credit History (1 = Good, 0 = Bad)</label>
<input type="number" step="0.1" name="credit_history" required>

<label>Property Area</label>
<select name="property_area">
<option value="urban">Urban</option>
<option value="semiurban">Semiurban</option>
<option value="rural">Rural</option>
</select>

<button type="submit">Predict</button>
</form>

{% if prediction %}
<div class="result">
<h3>Prediction: {{ prediction }}</h3>
{% if confidence %}
<h4>Confidence: {{ confidence }}%</h4>
{% endif %}
</div>
{% endif %}

</div>
</body>
</html>
